name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create app token
        id: app-token
        if: steps.changesets.outputs.published == 'true' && github.repository == 'anomalyco/browser-control'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.OPENCODE_APP_ID }}
          private-key: ${{ secrets.OPENCODE_APP_SECRET }}
          owner: ${{ github.repository_owner }}
      - name: Update Homebrew formula
        if: steps.changesets.outputs.published == 'true' && github.repository == 'anomalyco/browser-control'
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(jq -r '.[] | select(.name == "@opencode-ai/browser-control") | .version' <<< "$PUBLISHED_PACKAGES")
          test -n "$VERSION"

          TARBALL_URL="https://registry.npmjs.org/@opencode-ai/browser-control/-/browser-control-${VERSION}.tgz"
          curl --retry 10 --retry-all-errors --retry-delay 3 --fail --location "$TARBALL_URL" --output browser-control.tgz
          SHA256=$(sha256sum browser-control.tgz | cut -d ' ' -f 1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/anomalyco/homebrew-tap.git" homebrew-tap
          cat > homebrew-tap/browser-control.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file is generated by the Browser Control release workflow. DO NOT EDIT.
          class BrowserControl < Formula
            desc "Control an existing Chromium browser with trusted coding agents"
            homepage "https://github.com/anomalyco/browser-control"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
            end

            def caveats
              extension = opt_libexec/"lib/node_modules/@opencode-ai/browser-control/extension/dist"
              <<~EOS
                Load the Browser Control extension from:
                  #{extension}

                In your Chromium-family browser, enable Developer mode, choose
                "Load unpacked", then select that directory.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/browser-control --version")
              assert_match "# Browser Control", shell_output("#{bin}/browser-control skill")
            end
          end
          FORMULA

          git -C homebrew-tap config user.name "${APP_SLUG}[bot]"
          git -C homebrew-tap config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git -C homebrew-tap add browser-control.rb
          git -C homebrew-tap commit -m "Update browser-control to v${VERSION}"
          git -C homebrew-tap push
